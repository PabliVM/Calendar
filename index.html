<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Calendario</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#007AFF;
  --bg:#F2F2F7;
  --surface:#FFFFFF;
  --surface2:#F2F2F7;
  --text:#1C1C1E;
  --text2:#8E8E93;
  --text3:#C7C7CC;
  --sep:#E5E5EA;
  --red:#FF3B30;
}
html{font-family:-apple-system,"SF Pro Display",system-ui,sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);height:100%;overscroll-behavior:none}
body{height:100%;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,20px)}

/* Header */
.app-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep);padding-top:env(safe-area-inset-top,0px)}
.app-title-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px}
.app-title{font-size:26px;font-weight:800;letter-spacing:-.6px;color:var(--text);line-height:1}
.app-avatar{width:116px;height:116px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:700;color:white;overflow:hidden;flex-shrink:0;cursor:pointer}
.app-avatar img{width:100%;height:100%;object-fit:cover}
.header-inner{padding:8px 20px 8px}
.header-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.header-title-block{text-align:center;flex:1}
.month-title{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--text);line-height:1.1}
.nav-btn{width:36px;height:36px;border:none;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);transition:opacity .15s;flex-shrink:0}
.nav-btn:active{opacity:.6}
.view-toggle{display:flex;background:var(--surface2);border-radius:9px;padding:2px;margin:0 auto;width:fit-content}
.toggle-btn{border:none;background:transparent;padding:5px 18px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;line-height:1}
.toggle-btn.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Weekday labels */
.weekday-labels{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:4px 12px 6px;border-bottom:.5px solid var(--sep);position:sticky;top:158px;z-index:99}
.weekday-labels span{text-align:center;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.3px;text-transform:uppercase}

/* Main */
.calendar-main{padding:0;min-height:calc(100vh - 180px)}
.view-container{width:100%}
.hidden{display:none!important}

/* Monthly grid */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;padding:0 0 80px;border-top:.5px solid var(--sep)}
.day-cell{min-height:96px;padding:6px 4px 4px;border-right:.5px solid var(--sep);border-bottom:.5px solid var(--sep);position:relative;cursor:pointer;background:var(--surface);overflow:visible}
.day-cell:active{background:var(--surface2)}
.day-cell:nth-child(7n){border-right:none}
.day-cell.other-month{background:#FAFAFA}
.day-cell.other-month .day-number{color:var(--text3)}
.day-cell.today .day-number{background:var(--accent);color:white;border-radius:50%;min-width:22px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:600;padding:0}
.day-number{font-size:12px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px;display:flex;align-items:center;justify-content:center;min-width:22px;width:auto;height:22px;padding:0 3px}
.day-events{display:flex;flex-direction:column;gap:1.5px}
.event-pill{display:flex;align-items:center;gap:3px;padding:1.5px 4px;border-radius:4px;font-size:9.5px;font-weight:500;line-height:1.3;color:white;white-space:nowrap;overflow:hidden;cursor:pointer;position:relative;z-index:1}
.event-pill.multiday-start{border-radius:4px 0 0 4px}
.event-pill.multiday-mid{border-radius:0;padding-left:2px;padding-right:2px}
.event-pill.multiday-end{border-radius:0 4px 4px 0;padding-left:2px}
.event-pill[data-span]{position:absolute;left:0;right:0;z-index:2;pointer-events:auto}
.pill-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.7);flex-shrink:0}
.pill-warn{font-size:8px;flex-shrink:0}
.event-pill-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.multiday-row{position:relative;height:14px;margin-bottom:1.5px}
.multiday-bar{position:absolute;top:0;bottom:0;display:flex;align-items:center;font-size:9.5px;font-weight:500;color:white;cursor:pointer;overflow:hidden;white-space:nowrap;padding:0 5px;z-index:2}
.more-link{font-size:9px;color:var(--accent);font-weight:600;padding:1px 4px;cursor:pointer}
.conflict-badge{position:absolute;top:3px;right:3px;font-size:9px}

/* Weekly */
.week-list{padding:8px 16px 80px;display:flex;flex-direction:column;gap:8px}
.week-day-block{background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.week-day-header{display:flex;align-items:center;gap:10px;padding:10px 14px 8px;border-bottom:.5px solid var(--sep);cursor:pointer}
.week-day-name{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;min-width:24px}
.week-day-num{font-size:17px;font-weight:700;color:var(--text);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.week-day-num.today{background:var(--accent);color:white}
.week-day-events{padding:4px 0}
.week-event-row{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;border-bottom:.5px solid var(--sep)}
.week-event-row:last-child{border-bottom:none}
.week-event-row:active{background:var(--surface2)}
.week-event-color{width:4px;border-radius:2px;align-self:stretch;min-height:20px;flex-shrink:0}
.week-event-info{flex:1;min-width:0}
.week-event-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-event-time{font-size:12px;color:var(--text2);margin-top:1px}
.week-event-warn{font-size:14px;color:#FF9F0A}

/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,122,255,.4);z-index:200;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(0,122,255,.3)}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Modal sheet */
.modal-sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.32,1,.25,1);padding-bottom:env(safe-area-inset-bottom,8px)}
.modal-handle{width:36px;height:4px;background:var(--sep);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--sep);flex-shrink:0}
.modal-title{font-size:17px;font-weight:600;color:var(--text)}
.modal-cancel{border:none;background:none;font-size:16px;color:var(--accent);cursor:pointer;padding:4px;min-width:60px;text-align:left;font-family:inherit}
.modal-save{border:none;background:none;font-size:16px;font-weight:600;color:var(--accent);cursor:pointer;padding:4px;min-width:60px;text-align:right;font-family:inherit}
.modal-body{overflow-y:auto;flex:1;padding:16px 0 20px;-webkit-overflow-scrolling:touch}

/* Fields */
.field-group{margin:0 16px 10px;background:var(--surface);border-radius:12px;border:.5px solid var(--sep);overflow:hidden}
.field-row{display:flex;align-items:center;padding:12px 14px}
.field-label{font-size:15px;color:var(--text);flex:1}
.mb-8{padding:12px 14px 4px;display:block}
.field-divider{height:.5px;background:var(--sep);margin:0 14px}
.field-input{width:100%;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text);background:transparent;padding:12px 14px;resize:none;-webkit-appearance:none}
.field-input.large{font-size:17px;font-weight:500;padding:14px}
.field-input.right{text-align:right;color:var(--text2);width:auto}
.field-input::placeholder{color:var(--text3)}

/* Toggle */
.toggle-switch{position:relative;display:inline-block;cursor:pointer}
.toggle-switch input{display:none}
.toggle-track{display:block;width:50px;height:30px;background:var(--sep);border-radius:15px;transition:background .25s;position:relative}
.toggle-thumb{position:absolute;top:2px;left:2px;width:26px;height:26px;background:white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:transform .25s}
.toggle-switch input:checked+.toggle-track{background:var(--accent)}
.toggle-switch input:checked+.toggle-track .toggle-thumb{transform:translateX(20px)}

/* Category pills */
.category-pills{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 10px}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:2px solid transparent;color:white;transition:all .15s}
.cat-pill.selected{border-color:#1C1C1E;box-shadow:0 0 0 1px #1C1C1E}
.add-category-btn{display:block;margin:2px 14px 10px;font-size:13px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;text-align:left;padding:4px 0}
.delete-btn{width:100%;border:none;background:none;font-size:15px;font-weight:500;color:var(--red);text-align:center;cursor:pointer;padding:14px;font-family:inherit}

/* Confirm */
.confirm-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));animation:slideUp .25s ease}
#confirmModal{z-index:500}
.confirm-text{font-size:15px;color:var(--text);text-align:center;padding:8px 0 20px;line-height:1.4}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel,.confirm-delete{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.confirm-cancel{background:var(--surface2);color:var(--text)}
.confirm-delete{background:var(--red);color:white}

/* Day detail */
.day-event-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:.5px solid var(--sep)}
.day-event-item:active{background:var(--surface2)}
.day-event-item:last-child{border-bottom:none}
.day-event-color{width:5px;border-radius:2.5px;align-self:stretch;min-height:24px;flex-shrink:0}
.day-event-info{flex:1;min-width:0}
.day-event-title{font-size:15px;font-weight:500;color:var(--text)}
.day-event-meta{font-size:12px;color:var(--text2);margin-top:2px}

/* Color picker */
.color-picker{display:flex;flex-wrap:wrap;gap:10px;padding:4px 0}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .15s}
.color-swatch.selected{border-color:#1C1C1E;transform:scale(1.15)}

/* Ficha de evento */
.ev-card-header{display:flex;align-items:flex-start;gap:14px;padding:20px 20px 12px}
.ev-card-color-bar{width:5px;border-radius:3px;min-height:48px;align-self:stretch;flex-shrink:0;margin-top:2px}
.ev-card-title{font-size:22px;font-weight:700;color:var(--text);line-height:1.2;flex:1}
.ev-card-cat{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;font-weight:500;color:var(--text2)}
.ev-card-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ev-card-body{padding:0 20px 4px}
.ev-card-row{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:.5px solid var(--sep)}
.ev-card-row:last-child{border-bottom:none}
.ev-card-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0;line-height:1.4}
.ev-card-text{font-size:15px;color:var(--text);line-height:1.5;flex:1;white-space:pre-wrap}
.ev-card-text.muted{color:var(--text2)}
.ev-card-actions{display:flex;gap:10px;padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px))}
.ev-btn-edit{flex:1;padding:15px;border-radius:14px;font-size:16px;font-weight:600;border:none;cursor:pointer;font-family:inherit;background:var(--accent);color:white}
.ev-btn-delete{flex:1;padding:15px;border-radius:14px;font-size:16px;font-weight:600;border:none;cursor:pointer;font-family:inherit;background:#FFE5E5;color:var(--red)}

::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title-bar">
    <span class="app-title">Calendario MLP</span>
    <div class="app-avatar" id="appAvatar" title="Cambiar foto">
      <img src="avatar.jpg" alt="foto">
    </div>
  </div>
  <div class="header-inner">
    <div class="header-nav">
      <button class="nav-btn" id="prevBtn" aria-label="Anterior">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="header-title-block">
        <h1 class="month-title" id="monthTitle"></h1>
      </div>
      <button class="nav-btn" id="nextBtn" aria-label="Siguiente">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M1.5 1L8.5 8L1.5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="view-toggle">
      <button class="toggle-btn active" id="btnMonthly">Mes</button>
      <button class="toggle-btn" id="btnWeekly">Semana</button>
    </div>
  </div>
</header>

<div class="weekday-labels" id="weekdayLabels">
  <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
</div>

<main class="calendar-main">
  <div class="view-container" id="monthlyView">
    <div class="month-grid" id="monthGrid"></div>
  </div>
  <div class="view-container hidden" id="weeklyView">
    <div class="week-list" id="weekList"></div>
  </div>
</main>

<button class="fab" id="fabBtn" aria-label="Añadir evento">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3V17M3 10H17" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
</button>

<!-- Event modal -->
<div class="modal-overlay hidden" id="eventModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="modal-cancel" id="modalCancel">Cancelar</button>
      <h2 class="modal-title" id="modalTitle">Nuevo evento</h2>
      <button class="modal-save" id="modalSave">Guardar</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <input type="text" class="field-input large" id="fieldTitle" placeholder="Título del evento" maxlength="80"/>
      </div>
      <div class="field-group">
        <div class="field-row">
          <label class="field-label" for="fieldAllDay">Todo el día</label>
          <label class="toggle-switch">
            <input type="checkbox" id="fieldAllDay"/>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </div>
      <div class="field-group">
        <div class="field-row">
          <label class="field-label">Inicio</label>
          <input type="date" class="field-input right" id="fieldDate"/>
        </div>
        <div class="field-divider"></div>
        <div class="field-row">
          <label class="field-label">Fin</label>
          <input type="date" class="field-input right" id="fieldEndDate"/>
        </div>
      </div>
      <div class="field-group" id="timeFields" style="transition:opacity .2s">
        <div class="field-row">
          <label class="field-label">Hora inicio</label>
          <input type="time" class="field-input right" id="fieldStart"/>
        </div>
        <div class="field-divider"></div>
        <div class="field-row">
          <label class="field-label">Hora fin</label>
          <input type="time" class="field-input right" id="fieldEnd"/>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label mb-8">Categoría</label>
        <div class="category-pills" id="categoryPills"></div>
        <button class="add-category-btn" id="addCategoryBtn">+ Nueva categoría</button>
      </div>
      <div class="field-group">
        <textarea class="field-input" id="fieldDescription" placeholder="Descripción" rows="2"></textarea>
      </div>
      <div class="field-group">
        <input type="text" class="field-input" id="fieldLocation" placeholder="Lugar"/>
      </div>
      <div class="field-group">
        <textarea class="field-input" id="fieldNotes" placeholder="Notas" rows="2"></textarea>
      </div>
      <div class="field-group" id="deleteGroup" style="display:none">
        <button class="delete-btn" id="deleteBtn">Borrar evento</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="confirm-sheet">
    <p class="confirm-text">¿Seguro que quieres borrar este evento?</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirmCancel">Cancelar</button>
      <button class="confirm-delete" id="confirmDelete">Borrar</button>
    </div>
  </div>
</div>

<!-- Day detail -->
<div class="modal-overlay hidden" id="dayModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="modal-cancel" id="dayModalClose">Cerrar</button>
      <h2 class="modal-title" id="dayModalTitle">Eventos</h2>
      <div style="width:60px"></div>
    </div>
    <div class="modal-body" id="dayModalBody"></div>
  </div>
</div>

<!-- Ficha de evento (vista detalle) -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="modal-cancel" id="detailClose">Cerrar</button>
      <h2 class="modal-title"></h2>
      <div style="width:60px"></div>
    </div>
    <div class="modal-body">
      <div class="ev-card-header">
        <div class="ev-card-color-bar" id="detailColorBar"></div>
        <div style="flex:1;min-width:0">
          <div class="ev-card-title" id="detailTitle"></div>
          <div class="ev-card-cat" id="detailCat">
            <span class="ev-card-cat-dot" id="detailCatDot"></span>
            <span id="detailCatName"></span>
          </div>
        </div>
      </div>
      <div class="ev-card-body" id="detailBody"></div>
    </div>
    <div class="ev-card-actions">
      <button class="ev-btn-edit" id="detailEdit">✏️ Editar</button>
      <button class="ev-btn-delete" id="detailDelete">🗑 Borrar</button>
    </div>
  </div>
</div>

<!-- Category creator -->
<div class="modal-overlay hidden" id="catModal">
  <div class="confirm-sheet" style="padding:24px 20px">
    <h3 id="catModalTitle" style="font-size:17px;font-weight:600;margin:0 0 16px;color:var(--text)">Nueva categoría</h3>
    <div class="field-group" style="margin:0 0 12px">
      <input type="text" class="field-input" id="catNameInput" placeholder="Nombre"/>
    </div>
    <div class="color-picker" id="colorPicker"></div>
    <div class="confirm-actions" style="margin-top:16px">
      <button class="confirm-cancel" id="catCancel">Cancelar</button>
      <button class="confirm-delete" id="catSave" style="background:var(--accent)">Guardar</button>
    </div>
    <button id="catDeleteBtn" style="display:none;width:100%;margin-top:10px;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:600;color:#FF3B30;background:var(--surface2);cursor:pointer;font-family:inherit">Eliminar categoría</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  addDoc, updateDoc, deleteDoc,
  onSnapshot, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function deleteCategory(id) {
  return deleteDoc(doc(db, "categories", id));
}

const firebaseConfig = {
  apiKey:            "AIzaSyBmWUde0XBMo4EBCBbQLlWWMn8ilHyx_L4",
  authDomain:        "calendar-78c7c.firebaseapp.com",
  projectId:         "calendar-78c7c",
  storageBucket:     "calendar-78c7c.firebasestorage.app",
  messagingSenderId: "795817842509",
  appId:             "1:795817842509:web:e61e79362f98a9f1e28904"
};

const _app = initializeApp(firebaseConfig);
const db   = getFirestore(_app);

function subscribeEvents(cb) {
  const q = collection(db, "events");
  return onSnapshot(q, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
}
function subscribeCategories(cb) {

const DEFAULT_CATS = [
  { name:"Laura",        color:"#5AC8FA" },
  { name:"Pablo",        color:"#34C759" },
  { name:"Manuela",      color:"#FF2D55" },
  { name:"Broche Final", color:"#AF52DE" }
];
const PALETTE = ["#FF3B30","#FF9F0A","#FFCC00","#34C759","#00C7BE","#5AC8FA","#007AFF","#5856D6","#AF52DE","#FF2D55","#8E8E93","#636366"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const state = {
  events: [], categories: [],
  view: "monthly",
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth(),
  currentWeekStart: getMonday(new Date()),
  editingId: null, selectedCat: null, selectedColor: PALETTE[5]
};

function getMonday(date) {
  const d = new Date(date), day = d.getDay();
  d.setDate(d.getDate() + ((day === 0) ? -6 : 1 - day));
  d.setHours(0,0,0,0); return d;
}
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function parseDate(s) { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function todayStr() { return formatDate(new Date()); }
function isTodayStr(s) { return s === todayStr(); }
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }

function renderView() {
  updateHeader();
  state.view === "monthly" ? renderMonthly() : renderWeekly();
}

function updateHeader() {
  const el = document.getElementById("monthTitle");
  if (state.view === "monthly") {
    el.textContent = `${MONTHS_ES[state.currentMonth]} ${state.currentYear}`;
  } else {
    const ws = state.currentWeekStart, end = addDays(ws, 6);
    el.textContent = ws.getMonth() === end.getMonth()
      ? `${ws.getDate()}–${end.getDate()} ${MONTHS_ES[ws.getMonth()]}`
      : `${ws.getDate()} ${MONTHS_ES[ws.getMonth()]} – ${end.getDate()} ${MONTHS_ES[end.getMonth()]}`;
  }
}

function renderMonthly() {
  document.getElementById("monthlyView").classList.remove("hidden");
  document.getElementById("weeklyView").classList.add("hidden");
  document.getElementById("weekdayLabels").style.display = "grid";

  const { currentYear: y, currentMonth: m } = state;
  const grid = document.getElementById("monthGrid");

  // Cancelar cualquier rAF pendiente para evitar barras de renders anteriores
  if (grid._rafId) { cancelAnimationFrame(grid._rafId); grid._rafId = null; }

  grid.innerHTML = "";

  const firstDay = new Date(y, m, 1).getDay();
  const offset   = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInM  = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();
  const total    = Math.ceil((offset + daysInM) / 7) * 7;
  const weeks    = total / 7;

  const allDates = [];
  for (let i = 0; i < total; i++) {
    let dateStr, isOther = false;
    if (i < offset) {
      dateStr = formatDate(new Date(m===0?y-1:y, m===0?11:m-1, daysInPrev - offset + i + 1));
      isOther = true;
    } else if (i < offset + daysInM) {
      dateStr = formatDate(new Date(y, m, i - offset + 1));
    } else {
      dateStr = formatDate(new Date(m===11?y+1:y, m===11?0:m+1, i - offset - daysInM + 1));
      isOther = true;
    }
    allDates.push({ dateStr, isOther });
  }

  // Pre-calcular cuántas barras multiday ocupa cada celda (para offset de pills)
  const multidayCountPerCell = calcMultidayLanes(allDates, weeks);

  const cells = allDates.map(({ dateStr, isOther }, idx) =>
    buildDayCell(dateStr, isOther, multidayCountPerCell[idx])
  );
  cells.forEach(c => grid.appendChild(c));

  // rAF para que el layout esté calculado antes de leer offsetTop/offsetLeft
  requestAnimationFrame(() => renderMultidayBars(grid, allDates, cells, weeks));
}

// Calcula cuántas barras multiday hay en cada celda (para desplazar las pills)
function calcMultidayLanes(allDates, weeks) {
  const LANE_H = 16, LANE_GAP = 2;
  const total = allDates.length;
  const counts = new Array(total).fill(0); // max lane usado por celda
  const multiday = state.events.filter(ev => isMultiDay(ev));

  for (let week = 0; week < weeks; week++) {
    const rowStart = week * 7;
    const rowDates = allDates.slice(rowStart, rowStart + 7).map(d => d.dateStr);
    const rowFirst = rowDates[0];
    const rowLast  = rowDates[6];

    const rowEvents = multiday.filter(ev =>
      ev.date <= rowLast && ev.endDate >= rowFirst
    );
    if (rowEvents.length === 0) continue;

    rowEvents.sort((a, b) => a.date.localeCompare(b.date));
    const lanes = [];

    rowEvents.forEach(ev => {
      const visStart = ev.date < rowFirst ? 0 : rowDates.indexOf(ev.date);
      const visEnd   = ev.endDate > rowLast ? 6 : rowDates.indexOf(ev.endDate);
      if (visStart === -1 || visEnd === -1) return;

      let lane = lanes.findIndex(l => l <= visStart);
      if (lane === -1) lane = lanes.length;
      lanes[lane] = visEnd + 1;

      // Apuntar el máximo lane+1 en cada celda afectada
      for (let ci = visStart; ci <= visEnd; ci++) {
        counts[rowStart + ci] = Math.max(counts[rowStart + ci], lane + 1);
      }
    });
  }
  return counts;
}

function renderMultidayBars(grid, allDates, cells, weeks) {
  const LANE_H = 16, LANE_GAP = 2, TOP_OFFSET = 24;
  const multiday = state.events.filter(ev => isMultiDay(ev));

  grid.style.position = 'relative';
  // Limpiar barras anteriores
  grid.querySelectorAll(".multiday-bar").forEach(b => b.remove());

  // Pre-calcular top de cada fila usando la primera celda de cada semana
  // Necesitamos forzar layout primero — usamos offsetTop que es síncrono
  const rowTops = [];
  for (let w = 0; w < weeks; w++) {
    rowTops.push(cells[w * 7].offsetTop);
  }
  const gridW = grid.offsetWidth;

  for (let week = 0; week < weeks; week++) {
    const rowStart = week * 7;
    const rowDates = allDates.slice(rowStart, rowStart + 7).map(d => d.dateStr);
    const rowCells = cells.slice(rowStart, rowStart + 7);
    const rowFirst = rowDates[0];
    const rowLast  = rowDates[6];

    const rowEvents = multiday.filter(ev =>
      ev.date <= rowLast && ev.endDate >= rowFirst
    );
    if (rowEvents.length === 0) continue;

    rowEvents.sort((a, b) => a.date.localeCompare(b.date));
    const lanes = [];

    rowEvents.forEach(ev => {
      const visStart = ev.date < rowFirst ? 0 : rowDates.indexOf(ev.date);
      const visEnd   = ev.endDate > rowLast ? 6 : rowDates.indexOf(ev.endDate);
      if (visStart === -1 || visEnd === -1) return;

      let lane = lanes.findIndex(l => l <= visStart);
      if (lane === -1) lane = lanes.length;
      lanes[lane] = visEnd + 1;

      const cat   = getCat(ev.category);
      const color = cat ? cat.color : "#8E8E93";
      const startsInRow = ev.date >= rowFirst;
      const endsInRow   = ev.endDate <= rowLast;
      const spanCols    = visEnd - visStart + 1;

      // Posición usando offsetLeft/offsetTop — síncrono y fiable en todos los navegadores
      const leftPx = cells[rowStart + visStart].offsetLeft + 1;
      const widthPx = (gridW / 7) * spanCols - 2;
      const topPx  = rowTops[week] + TOP_OFFSET + lane * (LANE_H + LANE_GAP);

      const bar = document.createElement("div");
      bar.className = "multiday-bar";
      bar.style.cssText = [
        `position:absolute`,
        `left:${leftPx}px`,
        `width:${widthPx}px`,
        `top:${topPx}px`,
        `height:${LANE_H}px`,
        `background:${color}`,
        `border-radius:${startsInRow?'4px':'0'} ${endsInRow?'4px':'0'} ${endsInRow?'4px':'0'} ${startsInRow?'4px':'0'}`,
        `z-index:3`,
        `overflow:hidden`,
        `white-space:nowrap`,
        `font-size:9.5px`,
        `font-weight:500`,
        `color:white`,
        `padding:0 5px`,
        `display:flex`,
        `align-items:center`,
        `cursor:pointer`,
        `pointer-events:auto`,
      ].join(';');

      if (startsInRow || visStart === 0) bar.textContent = ev.title;
      bar.addEventListener("click", e => { e.stopPropagation(); openDetailModal(ev); });
      grid.appendChild(bar);

      // Ocultar pills individuales en celdas cubiertas
      rowDates.forEach((d, ci) => {
        if (ci >= visStart && ci <= visEnd) {
          rowCells[ci].querySelectorAll(".event-pill").forEach(p => {
            if (p.dataset.evid === ev.id) p.style.display = "none";
          });
        }
      });
    });
  }
}

function buildDayCell(dateStr, isOther, multidayCount) {
  const LANE_H = 16, LANE_GAP = 2, TOP_OFFSET = 24;
  const cell = document.createElement("div");
  cell.className = "day-cell" + (isOther ? " other-month" : "") + (isTodayStr(dateStr) ? " today" : "");

  const num = document.createElement("div");
  num.className = "day-number";
  num.textContent = parseDate(dateStr).getDate();
  cell.appendChild(num);

  const dayEvts = eventsForDay(dateStr);
  const sorted  = sortEvts(dayEvts);
  const conflicts = detectConflicts(dayEvts);

  const ec = document.createElement("div");
  ec.className = "day-events";

  // Desplazar pills hacia abajo si hay barras multiday ocupando espacio
  if (multidayCount > 0) {
    const pillsTop = TOP_OFFSET + multidayCount * (LANE_H + LANE_GAP);
    ec.style.marginTop = `${pillsTop - 22}px`; // 22 = altura del número del día
  }

  // Solo mostrar eventos que NO son multiday (los multiday ya tienen su barra)
  const singleEvts = sorted.filter(ev => !isMultiDay(ev));
  singleEvts.slice(0, 3).forEach(ev => {
    const pill = buildPill(ev, conflicts.has(ev.id), dateStr);
    pill.dataset.evid = ev.id;
    pill.addEventListener("click", e => { e.stopPropagation(); openDetailModal(ev); });
    ec.appendChild(pill);
  });

  if (singleEvts.length > 3) {
    const more = document.createElement("div");
    more.className = "more-link";
    more.textContent = `+${singleEvts.length - 3} más`;
    more.addEventListener("click", e => { e.stopPropagation(); openDayModal(dateStr, sorted, conflicts); });
    ec.appendChild(more);
  }

  cell.appendChild(ec);

  if (conflicts.size > 0) {
    const badge = document.createElement("div");
    badge.className = "conflict-badge";
    badge.textContent = "⚠️";
    cell.appendChild(badge);
  }

  cell.addEventListener("click", () => openNewEventOnDate(dateStr));
  return cell;
}

function buildPill(ev, warn, dateStr) {
  const cat = getCat(ev.category);
  const role = dateStr ? dayRole(ev, dateStr) : "single";
  const pill = document.createElement("div");
  pill.className = "event-pill" + (role !== "single" ? " multiday-" + role : "");
  pill.style.background = cat ? cat.color : "#8E8E93";

  const showDot = role === "single" || role === "start";
  if (showDot) { const dot = document.createElement("span"); dot.className = "pill-dot"; pill.appendChild(dot); }
  if (warn) { const w = document.createElement("span"); w.className = "pill-warn"; w.textContent = "⚠️"; pill.appendChild(w); }
  const txt = document.createElement("span"); txt.className = "event-pill-text";
  txt.textContent = (role === "mid" || role === "end") ? "·" : ev.title;
  pill.appendChild(txt);
  return pill;
}

function detectConflicts(evts) {
  const timed = evts.filter(e => !e.allDay && e.startTime && e.endTime);
  const ids = new Set();
  for (let i = 0; i < timed.length; i++)
    for (let j = i+1; j < timed.length; j++)
      if (timed[i].startTime < timed[j].endTime && timed[j].startTime < timed[i].endTime) {
        ids.add(timed[i].id); ids.add(timed[j].id);
      }
  return ids;
}

function hasConflict(newEv, all) {
  if (newEv.allDay || !newEv.startTime || !newEv.endTime) return false;
  return all.some(e => e.id !== newEv.id && e.date === newEv.date && !e.allDay && e.startTime && e.endTime
    && newEv.startTime < e.endTime && e.startTime < newEv.endTime);
}

function sortEvts(evts) {
  return [...evts].sort((a, b) => {
    const rank = e => e.allDay ? 0 : (e.startTime ? 2 : 1);
    if (rank(a) !== rank(b)) return rank(a) - rank(b);
    if (a.startTime && b.startTime) return a.startTime.localeCompare(b.startTime);
    return 0;
  });
}

function eventSpansDay(ev, dateStr) {
  const end = ev.endDate || ev.date;
  return ev.date <= dateStr && dateStr <= end;
}
function eventsForDay(dateStr) { return state.events.filter(e => eventSpansDay(e, dateStr)); }
function isMultiDay(ev) { return ev.endDate && ev.endDate > ev.date; }
function dayRole(ev, dateStr) {
  if (!isMultiDay(ev)) return "single";
  if (ev.date === dateStr) return "start";
  if (ev.endDate === dateStr) return "end";
  return "mid";
}
function getCat(id) { return state.categories.find(c => c.id === id) || null; }

function openDetailModal(ev) {

  document.getElementById("detailTitle").textContent = ev.title || "";

  let fechaTexto = "";

    const d1 = parseDate(ev.date), d2 = parseDate(ev.endDate);
    fechaTexto = `${d1.getDate()} ${MONTHS_ES[d1.getMonth()]} → ${d2.getDate()} ${MONTHS_ES[d2.getMonth()]} ${d2.getFullYear()}`;
  } else {
    const d = parseDate(ev.date);
    fechaTexto = `${d.getDate()} ${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`;
  }

  if (ev.notes)       addDetailRow(body, "💬", ev.notes);

    closeDetailModal();

}

async function saveEvent() {
  const title   = document.getElementById("fieldTitle").value.trim();
  const date    = document.getElementById("fieldDate").value;
  const allDay  = document.getElementById("fieldAllDay").checked;
  const startTime = allDay ? "" : document.getElementById("fieldStart").value;
  const endTime   = allDay ? "" : document.getElementById("fieldEnd").value;
  const description = document.getElementById("fieldDescription").value.trim();
  const location    = document.getElementById("fieldLocation").value.trim();
  const notes       = document.getElementById("fieldNotes").value.trim();
  const category    = state.selectedCat;

  if (!title) { alert("El título es obligatorio."); return; }
  if (!date)  { alert("La fecha es obligatoria."); return; }
  if (!allDay && startTime && endTime && endTime <= startTime) { alert("La hora de fin debe ser mayor que la de inicio."); return; }

  const endDate = document.getElementById("fieldEndDate").value || date;
  if (endDate < date) { alert("La fecha de fin no puede ser anterior a la de inicio."); return; }
  const evData = { title, date, endDate, allDay, startTime: startTime||"", endTime: endTime||"", description, location, notes, category: category||"" };

  if (hasConflict({ ...evData, id: state.editingId }, state.events)) {
    if (!confirm("⚠️ Este evento se solapa con otro. ¿Guardar de todas formas?")) return;
  }

  try {
    state.editingId ? await updateEvent(state.editingId, evData) : await addEvent(evData);
    closeEventModal();
  } catch (err) { alert("Error al guardar."); }
}

let _pendingDeleteId = null;
function openConfirmDeleteForId(id) {
  _pendingDeleteId = id;
  document.getElementById("confirmModal").classList.remove("hidden");
}
function openConfirmDelete() {
  _pendingDeleteId = state.editingId;
  document.getElementById("confirmModal").classList.remove("hidden");
}
function closeConfirmDelete() {
  document.getElementById("confirmModal").classList.add("hidden");
  _pendingDeleteId = null;
}
async function confirmDeleteEvent() {
  if (!_pendingDeleteId) return;
  const id = _pendingDeleteId;
  try {
    await deleteEvent(id);
    closeConfirmDelete();
    closeDetailModal();
    closeEventModal();
  }
  catch(err) { alert("Error al borrar."); }
}

let editingCatId = null;

function openCatModal() {
  editingCatId = null;
  state.selectedColor = PALETTE[5];
  document.getElementById("catNameInput").value = "";
  document.getElementById("catModalTitle").textContent = "Nueva categoría";
  document.getElementById("catDeleteBtn").style.display = "none";
  buildColorPicker();
  document.getElementById("catModal").classList.remove("hidden");
}

function openEditCatModal(cat) {
  editingCatId = cat.id;
  state.selectedColor = cat.color;
  document.getElementById("catNameInput").value = cat.name;
  document.getElementById("catModalTitle").textContent = "Editar categoría";
  document.getElementById("catDeleteBtn").style.display = "block";
  buildColorPicker();
  document.getElementById("catModal").classList.remove("hidden");
}

function closeCatModal() { document.getElementById("catModal").classList.add("hidden"); editingCatId = null; }

function buildColorPicker() {
  const cp = document.getElementById("colorPicker"); cp.innerHTML = "";
  PALETTE.forEach(color => {
    const sw = document.createElement("div");
    sw.className = "color-swatch" + (color === state.selectedColor ? " selected" : "");
    sw.style.background = color;
    sw.addEventListener("click", () => { state.selectedColor = color; buildColorPicker(); });
    cp.appendChild(sw);
  });
}

async function saveCat() {
  const name = document.getElementById("catNameInput").value.trim();
  if (!name) { alert("El nombre es obligatorio."); return; }
  try {
    if (editingCatId) {
      await updateCategory(editingCatId, { name, color: state.selectedColor });
    } else {
      await addCategory({ name, color: state.selectedColor });
    }
    closeCatModal();
  } catch(err) { alert("Error al guardar categoría."); }
}

async function deleteCat() {
  if (!editingCatId) return;
  if (!confirm("¿Eliminar esta categoría? Los eventos no se borrarán.")) return;
  try { await deleteCategory(editingCatId); closeCatModal(); }
  catch(err) { alert("Error al eliminar."); }
}

function prevPeriod() {
  if (state.view === "monthly") { state.currentMonth--; if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; } }
  else { state.currentWeekStart = addDays(state.currentWeekStart, -7); }
  renderView();
}
function nextPeriod() {
  if (state.view === "monthly") { state.currentMonth++; if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; } }
  else { state.currentWeekStart = addDays(state.currentWeekStart, 7); }
  renderView();
}

let tx = 0, ty = 0;
document.addEventListener("touchstart", e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener("touchend", e => {
  if (!document.getElementById("eventModal").classList.contains("hidden")) return;
  if (!document.getElementById("dayModal").classList.contains("hidden")) return;
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) { dx < 0 ? nextPeriod() : prevPeriod(); }
}, { passive: true });

function switchView(view) {
  state.view = view;
  document.getElementById("btnMonthly").classList.toggle("active", view === "monthly");
  document.getElementById("btnWeekly").classList.toggle("active",  view === "weekly");
  if (view === "weekly") {
    const today = new Date();
    const ref = (today.getFullYear() === state.currentYear && today.getMonth() === state.currentMonth) ? today : new Date(state.currentYear, state.currentMonth, 1);
    state.currentWeekStart = getMonday(ref);
  }
  renderView();
}

document.getElementById("prevBtn").addEventListener("click", prevPeriod);
document.getElementById("nextBtn").addEventListener("click", nextPeriod);
document.getElementById("btnMonthly").addEventListener("click", () => switchView("monthly"));
document.getElementById("btnWeekly").addEventListener("click", () => switchView("weekly"));
document.getElementById("fabBtn").addEventListener("click", () => openNewEventOnDate(todayStr()));
document.getElementById("modalCancel").addEventListener("click", closeEventModal);
document.getElementById("modalSave").addEventListener("click", saveEvent);
document.getElementById("deleteBtn").addEventListener("click", openConfirmDelete);
document.getElementById("confirmCancel").addEventListener("click", closeConfirmDelete);
document.getElementById("confirmDelete").addEventListener("click", confirmDeleteEvent);
document.getElementById("fieldAllDay").addEventListener("change", e => toggleTimeFields(!e.target.checked));
document.getElementById("fieldDate").addEventListener("change", e => {
  const endDate = document.getElementById("fieldEndDate");
  if (!endDate.value || endDate.value < e.target.value) endDate.value = e.target.value;
});
document.getElementById("dayModalClose").addEventListener("click", closeDayModal);
document.getElementById("addCategoryBtn").addEventListener("click", openCatModal);
document.getElementById("catCancel").addEventListener("click", closeCatModal);
document.getElementById("catSave").addEventListener("click", saveCat);
document.getElementById("catDeleteBtn").addEventListener("click", deleteCat);

document.getElementById("detailClose").addEventListener("click", closeDetailModal);

["eventModal","confirmModal","dayModal","catModal","detailModal"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("click", function(e) { if (e.target === this) this.classList.add("hidden"); });
});

let catsInitialized = false;
subscribeCategories(cats => {
  state.categories = cats;
  if (!catsInitialized) {
    catsInitialized = true;
    if (cats.length === 0) {
      setTimeout(() => {
        if (state.categories.length === 0) {
          DEFAULT_CATS.forEach(c => addCategory(c));
        }
      }, 1500);
    }
  }
  renderView();
});
subscribeEvents(evs => {
  state.events = evs;
  renderView();
});
</script>
